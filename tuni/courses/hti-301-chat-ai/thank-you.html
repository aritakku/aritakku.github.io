<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Completed - Thank You</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --text-main: #1d1d1f;
            --text-secondary: #6e6e73;
            --accent-blue: #0071e3;
            --border-gray: #e5e5e5;
            --success-green: #248a3d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .thank-you-card {
            background: var(--card-bg);
            padding: 48px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: #f0fdf4;
            color: var(--success-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 16px 0;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            background: #f4f4f4;
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        .status-badge i {
            margin-right: 6px;
        }

        .close-hint {
            font-size: 0.85rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-gray);
            padding-top: 24px;
        }

        .btn-home {
            display: inline-block;
            background: var(--accent-blue);
            color: white;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-home:hover {
            background: #0077ed;
        }

    </style>
</head>
<body>

    <div class="thank-you-card">
        <div class="icon-container">
            <i data-lucide="check-circle-2" size="48"></i>
        </div>
        
        <h1>Participation Complete</h1>
        
        <p>Thank you for your time and feedback. Your responses have been successfully recorded and will help us improve the AI user experience.</p>

        <div class="status-badge">
            <i data-lucide="database" size="14"></i>
            Data securely saved and exported
        </div>

        <div class="close-hint">
            You may now close this browser window or return to the study dashboard.
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Optional: Clear temporary local storage now that study is done
        // localStorage.removeItem('user_query');
        // localStorage.removeItem('user_feedback');
    </script>

</body>
</html>
