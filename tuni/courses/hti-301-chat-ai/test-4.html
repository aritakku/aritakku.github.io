<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Usability Test</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div id="task-header">
        <div id="task-title"></div>
        <div id="task-desc"></div>
    </div>

    <div id="chat-container">
        <div id="prompt-heading"></div>
        <div id="input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" spellcheck="false" autocomplete="off">
                <button id="send-btn"><i data-lucide="arrow-up" size="18"></i></button>
            </div>
        </div>
        <div id="response-area"></div>
        <div id="copyright-notice"></div>
        <div id="bottom-nudge"></div>
        
        <div id="feedback-section">
            <label id="feedback-label"></label>
            <textarea id="feedback-text"></textarea>
            <div id="likert-container"></div>
            <button id="save-continue-btn">Save answers and continue to the next task</button>
        </div>
    </div>

    <div id="thank-you">
        <div class="success-icon"><i data-lucide="check-circle-2"></i></div>
        <h2 id="thanks-title">Thank you!</h2>
        <p id="thanks-message"></p>
    </div>

    <script>
		const GRAY_BOTTOM = 1, RED_BOTTOM = 2, GREY_ICON = 3, RED_ICON = 4;
		const NUDGE_BOTTOM_IMMEDIATE = 5, NUDGE_BOTTOM_AFTER_RESULT = 6;

        const CONFIG = {
			studyId: "test-4",
			participantId: "P1",

			afterSubmitForwardToNextWindowLocation: false,
			nextWindowLocationHref: "thank-you.html",
			
            nudgeType: RED_ICON, 

            //nudgeBottomTiming: NUDGE_BOTTOM_IMMEDIATE, 
            nudgeBottomTiming: NUDGE_BOTTOM_AFTER_RESULT, 
			
            typingSpeed: 2, // milliseconds per character

            taskTitle: "Task: Information about Vietnam, part 2",
			
            taskDescription: "You have heard about a country called Vietnam, from which you do not have any prior knowledge. Your task is to ask the AI to give information about Vietnam and answer the questions provided.",
            
			promptHeadingText: "What's on your mind today?",

            feedbackQuestion: "What are the neighbours of Vietnam?",

            nudgeText: "AI may provide unreliable results.",

			likertQuestions: [
				{ id: "ai-response-was-easy-to-understand", text: "The AI's response was easy to understand." },
				{ id: "i-felt-confident-in-the-information-provided", text: "I felt confident in the information provided." },
			],
			likertLabels: ["Strongly Disagree", "Disagree", "Neutral", "Agree", "Strongly Agree"],
            
			copyrightText: "Wikipedia.",
			
            // You can put [ALERT] anywhere in a line. 
            // It will float precisely where it is in the paragraph flow.
            aiResponse: [

"Vietnam, officially the Socialist Republic of Viet Nam (SRV), is a country at the eastern edge of Mainland Southeast Asia. With an area of about 331,000 square kilometres and a population of over 102 million, it is the world's 16th-most populous country. One of two communist states in Southeast Asia, [ALERT]Vietnam is bordered by China to the north, and Laos and Cambodia to the west;[/ALERT] it lies along the Gulf of Thailand to the southwest and the South China Sea to the east, where it has shared and disputed maritime borders with other countries. Its capital is Hanoi, while its largest city is Ho Chi Minh City.",

"Vietnam was inhabited by the Paleolithic age, with states established in the first millennium BC on the Red River Delta in modern-day northern Vietnam. The Han dynasty annexed northern and central Vietnam, which were subsequently under Chinese rule from 111 BC until the first dynasty emerged in 939. Successive monarchical dynasties absorbed Chinese influences through Confucianism and Buddhism, and expanded southward to the Mekong Delta, conquering Champa. During most of the 17th and 18th centuries, Vietnam was effectively divided into two domains of Đŕng Trong and Đŕng Ngoŕi. The Nguy--n—the last imperial dynasty—surrendered to France in 1883. In 1887, its territory was integrated into French Indochina as three separate regions. In the immediate aftermath of World War II, the Viet Minh, a coalition front led by the communist revolutionary Ho Chi Minh, launched the August Revolution and declared Vietnam's independence from the Empire of Japan in 1945.",

"Vietnam went through prolonged warfare in the 20th century. After World War II, France returned to reclaim colonial power in the First Indochina War, from which Vietnam emerged victorious in 1954. As a result of the treaties signed between the Viet Minh and France, Vietnam was also separated into two parts. The Vietnam War began shortly after, between the communist North Vietnam, supported by the Soviet Union and China, and the anti-communist South Vietnam, supported by the United States. Upon the North Vietnamese victory in 1975, Vietnam reunified as a unitary communist state that self-designated as a socialist state under the Communist Party of Vietnam (CPV) in 1976. An ineffective planned economy, a trade embargo by the West, and wars with Cambodia and China crippled the country further. In 1986, the CPV launched economic and political reforms similar to the Chinese economic reform, transforming the country to a socialist-oriented market economy. The reforms facilitated Vietnamese reintegration into the global economy and politics.",

"The most important economical partners of Vietnam are its four neighbours: [ALERT]China, Laos, Cambodia and Thailand[/ALERT], with which they exchange merchandise by utilizing the free-trade area.",

"Please note that some characters were broken, I replaced them with hyphens (--).",
            ],
                                    
            alertIconName: "alert-circle", // e.g., "alert-circle", "help-circle", "shield-alert"
        };
	</script>
    <script src="script.js"></script>
</body>
</html>
